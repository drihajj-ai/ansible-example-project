---
- name: Install Java 1.7 and dependencies
  apt:
    name:
      - openjdk-7-jdk
      - unzip
      - ufw
    state: present
    update_cache: yes

- name: Download JBoss AS
  get_url:
    url: http://download.jboss.org/jbossas/7.1/jboss-as-7.1.1.Final/jboss-as-7.1.1.Final.zip
    dest: /opt/jboss-as-7.1.1.Final.zip
    mode: '0644'

- name: Extract JBoss AS
  unarchive:
    src: /opt/jboss-as-7.1.1.Final.zip
    dest: /usr/share
    remote_src: yes
    creates: /usr/share/jboss-as

- name: Rename JBoss directory
  command: mv /usr/share/jboss-as-7.1.1.Final /usr/share/jboss-as
  args:
    creates: /usr/share/jboss-as

- name: Create jboss group
  group:
    name: jboss
    state: present

- name: Create jboss user
  user:
    name: jboss
    group: jboss
    home: /usr/share/jboss-as
    shell: /bin/bash
    create_home: no
    state: present

- name: Ensure correct ownership of JBoss installation
  file:
    path: /usr/share/jboss-as
    state: directory
    recurse: yes
    owner: jboss
    group: jboss

- name: Copy standalone.xml configuration
  template:
    src: standalone.xml
    dest: /usr/share/jboss-as/standalone/configuration/standalone.xml
  notify: restart jboss

- name: Copy systemd service file
  copy:
    src: jboss-as.service
    dest: /etc/systemd/system/jboss-as.service
    mode: '0644'
  notify:
    - daemon-reload
    - restart jboss

- name: Enable and start JBoss service
  systemd:
    name: jboss-as
    enabled: yes
    state: started

- name: Enable UFW firewall
  ufw:
    state: enabled

- name: Open HTTP and HTTPS ports in UFW
  ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop:
    - "{{ http_port }}"
    - "{{ https_port }}"
  notify: reload ufw
